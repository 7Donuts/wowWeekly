<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Midnight — Tracker Changelog</title>
<link rel="stylesheet" href="midnight.css">
<style>
  /* Changelog-specific styles */
  .cl-version {
    margin-bottom: 2rem;
  }

  .cl-version-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 1rem;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .cl-version-header:hover { border-color: var(--border-bright); background: var(--bg-card); }
  .cl-version-header.open { border-bottom-color: transparent; background: var(--bg-card); }

  .cl-version-tag {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--light-pale);
    letter-spacing: 0.06em;
  }

  .cl-version-date {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  .cl-version-summary {
    margin-left: auto;
    font-size: 11px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
  }

  .cl-body {
    border: 1px solid var(--border-bright);
    border-top: none;
    border-radius: 0 0 8px 8px;
    background: var(--bg-card);
    overflow: hidden;
  }
  .cl-body.hidden { display: none; }

  .cl-entry {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .cl-entry:last-child { border-bottom: none; }

  .cl-badge {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid transparent;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .badge-new      { background: rgba(74,140,92,0.15);  color: var(--success-bright); border-color: rgba(74,140,92,0.3); }
  .badge-fix      { background: rgba(192,83,74,0.15);  color: #e07068;               border-color: rgba(192,83,74,0.3); }
  .badge-improve  { background: rgba(124,92,191,0.15); color: var(--void-glow);      border-color: rgba(124,92,191,0.3); }
  .badge-content  { background: rgba(201,168,76,0.12); color: var(--light-gold);     border-color: rgba(201,168,76,0.3); }

  .cl-text {
    flex: 1;
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.45;
  }

  .cl-text span {
    font-size: 13px;
    color: var(--text-secondary);
    font-style: italic;
    display: block;
    margin-top: 1px;
  }

</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-eyebrow">World of Warcraft</div>
    <h1>Midnight<br><span>Tracker Changelog</span></h1>
    <p class="subtitle">A record of every update, fix, and addition to the Weekly Tracker.</p>
    <div class="credit-bar">
      Curated &amp; maintained by <span class="credit-name">Seven</span>
      <span style="color:var(--border-bright);margin:0 0.4rem;">·</span>
      <a href="index.html" class="byline-link">⬅ Back to Tracker</a>
    </div>
  </header>

  <a href="index.html" class="back-link">← Back to Weekly Tracker</a>

  <div id="changelog"></div>

  <footer>
    WoW Midnight Weekly Tracker &nbsp;·&nbsp; Curated by Seven &nbsp;·&nbsp; Patch 12.0.5 · May 2026
  </footer>
</div>

<script src="js/data-changelog.js"></script>
<script src="js/theme.js"></script>

<script>
function toggleVersion(idx) {
  const body = document.getElementById('cl-body-' + idx);
  const hdr  = document.getElementById('cl-hdr-' + idx);
  const chev = document.getElementById('cl-chev-' + idx);
  const isHidden = body.classList.contains('hidden');
  body.classList.toggle('hidden', !isHidden);
  hdr.classList.toggle('open', isHidden);
  chev.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
}

const BADGE = {
  new:     ['badge-new',     'New'],
  fix:     ['badge-fix',     'Fix'],
  improve: ['badge-improve', 'Improved'],
  content: ['badge-content', 'Content'],
  remove:  ['badge-fix',     'Removed'],
};

function render() {
  const container = document.getElementById('changelog');
  container.innerHTML = VERSIONS.map((v, i) => {
    const open = i === 0;
    return `
      <div class="cl-version">
        <div class="cl-version-header${open?' open':''}" id="cl-hdr-${i}" onclick="toggleVersion(${i})">
          <div class="section-icon icon-optional" style="font-size:12px;">📋</div>
          <div>
            <div class="cl-version-tag">${v.version}</div>
            <div class="cl-version-date">${v.date}</div>
          </div>
          <div class="cl-version-summary" style="color:var(--text-muted);">${v.summary}</div>
          <span class="chevron" id="cl-chev-${i}" style="transform:rotate(${open?'0':'-90'}deg);margin-left:0.5rem;">▼</span>
        </div>
        <div class="cl-body${open?'':' hidden'}" id="cl-body-${i}">
          ${v.entries.map(e => {
            const [cls, label] = BADGE[e.type] || ['badge-new','New'];
            return `
            <div class="cl-entry">
              <span class="cl-badge ${cls}">${label}</span>
              <div class="cl-text">
                ${e.text}
                ${e.detail ? `<span>${e.detail}</span>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
