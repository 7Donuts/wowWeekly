<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Midnight — World Events Calendar</title>
<link rel="stylesheet" href="midnight.css">
<style>
/* ── PAGE-SPECIFIC ── */
.events-header-sub {
  font-size: 15px;
  color: var(--text-secondary);
  font-style: italic;
  margin-top: 0.4rem;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 4px 14px;
  border-radius: 20px;
  transition: all 0.2s;
  margin-bottom: 2rem;
  display: inline-flex;
}
.back-link:hover {
  color: var(--light-gold);
  border-color: rgba(201,168,76,0.4);
  background: rgba(201,168,76,0.06);
}

/* ── FILTER BAR ── */
.ev-filter-bar {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.ev-filter-btn {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg-panel);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.ev-filter-btn:hover {
  border-color: var(--border-bright);
  color: var(--text-primary);
}
.ev-filter-btn.active {
  background: rgba(124,92,191,0.2);
  border-color: var(--void-purple);
  color: var(--void-glow);
}

/* ── MONTH GROUP ── */
.ev-month-group {
  margin-bottom: 2rem;
}
.ev-month-heading {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.4rem;
  margin-bottom: 0.75rem;
}

/* ── EVENT CARD ── */
.ev-card {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 0.75rem 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 0.5rem;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.ev-card:hover {
  border-color: var(--border-bright);
  background: var(--bg-card-hover);
}
.ev-card.ev-active {
  border-color: var(--void-purple);
  background: rgba(124,92,191,0.08);
}
.ev-card.ev-active::before {
  content: 'LIVE';
  position: absolute;
  top: 0.55rem;
  right: 0.75rem;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--success-bright);
  background: rgba(74,140,92,0.15);
  border: 1px solid rgba(74,140,92,0.35);
  border-radius: 3px;
  padding: 1px 6px;
}
.ev-card.ev-soon {
  border-color: rgba(201,168,76,0.35);
}
.ev-card.ev-soon::before {
  content: 'SOON';
  position: absolute;
  top: 0.55rem;
  right: 0.75rem;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--light-gold);
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 3px;
  padding: 1px 6px;
}
.ev-card.ev-past {
  opacity: 0.45;
}

.ev-date-col {
  flex-shrink: 0;
  width: 110px;
  text-align: right;
}
.ev-date-range {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
}
.ev-duration {
  font-size: 11px;
  color: var(--text-secondary);
  font-style: italic;
  margin-top: 2px;
}

.ev-divider {
  width: 1px;
  align-self: stretch;
  background: var(--border);
  flex-shrink: 0;
}

.ev-content {
  flex: 1;
  min-width: 0;
}
.ev-name {
  font-size: 17px;
  color: var(--text-primary);
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 2px;
}
.ev-name a {
  color: var(--void-glow);
  text-decoration: none;
  transition: color 0.15s;
}
.ev-name a:hover { color: var(--light-gold); }
.ev-desc {
  font-size: 14px;
  color: var(--text-secondary);
  font-style: italic;
  line-height: 1.4;
}

.ev-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 0.4rem;
}
.ev-tag {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.06em;
  padding: 1px 7px;
  border-radius: 3px;
  border: 1px solid transparent;
  text-transform: uppercase;
}
.ev-tag-pvp      { background: rgba(192,83,74,0.12);  color: #d48080; border-color: rgba(192,83,74,0.25); }
.ev-tag-world    { background: rgba(74,140,92,0.15);   color: var(--success-bright); border-color: rgba(74,140,92,0.3); }
.ev-tag-optional { background: rgba(90,80,112,0.15);   color: #8878aa; border-color: rgba(90,80,112,0.3); }
.ev-tag-delve    { background: rgba(124,92,191,0.1);   color: #b090e0; border-color: rgba(124,92,191,0.25); }
.ev-tag-mythic   { background: rgba(124,92,191,0.15);  color: var(--void-glow); border-color: rgba(124,92,191,0.3); }

/* ── CURRENT EVENT BANNER (top of page) ── */
.ev-now-banner {
  background: rgba(124,92,191,0.1);
  border: 1px solid var(--void-purple);
  border-radius: 8px;
  padding: 0.85rem 1.2rem;
  margin-bottom: 1.75rem;
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  flex-wrap: wrap;
}
.ev-now-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--void-glow);
  text-transform: uppercase;
  flex-shrink: 0;
  padding-top: 3px;
}
.ev-now-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.ev-now-item {
  font-size: 16px;
  color: var(--text-primary);
}
.ev-now-item a {
  color: var(--light-gold);
  text-decoration: none;
}
.ev-now-item a:hover { color: var(--light-pale); }
.ev-now-dates {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  margin-left: 0.4rem;
}

/* ── NOTHING ACTIVE STATE ── */
.ev-none-active {
  font-size: 15px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── LIGHT MODE OVERRIDES ── */
body.light-mode .ev-card { background: #f5f3ff; border-color: rgba(100,68,170,0.15); }
body.light-mode .ev-card:hover { background: #eeebff; }
body.light-mode .ev-card.ev-active { background: rgba(100,68,170,0.07); }
body.light-mode .ev-now-banner { background: rgba(100,68,170,0.06); }
body.light-mode .ev-filter-btn { background: rgba(240,237,255,0.6); }
body.light-mode .ev-filter-btn.active { background: rgba(100,68,170,0.12); }
</style>
</head>

</div>

/* ── HELPERS ── */
function today() {
  const n = new Date();
  return new Date(Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate()));
}
function parseDate(s) { return new Date(s + 'T00:00:00Z'); }
function isActive(ev) {
  const t = today();
  return parseDate(ev.start) <= t && t < parseDate(ev.end);
}
function isSoon(ev) {
  const t = today(), s = parseDate(ev.start);
  return s > t && (s - t) <= 7 * 24 * 60 * 60 * 1000;
}
function isPast(ev) { return today() >= parseDate(ev.end); }

function fmtDateRange(ev) {
  const opts = { month: 'short', day: 'numeric', timeZone: 'UTC' };
  const s = parseDate(ev.start).toLocaleDateString('en-US', opts);
  const e = new Date(parseDate(ev.end) - 86400000).toLocaleDateString('en-US', { ...opts, year: undefined });
  const sy = parseDate(ev.start).getUTCFullYear();
  const ey = parseDate(ev.end).getUTCFullYear();
  const showYear = sy !== new Date().getUTCFullYear() || ey !== new Date().getUTCFullYear();
  const yearStr = showYear ? ` '${String(sy).slice(2)}` : '';
  return `${s}${yearStr} – ${e}`;
}

function durationDays(ev) {
  const ms = parseDate(ev.end) - parseDate(ev.start);
  const d = Math.round(ms / 86400000);
  return d === 1 ? '1 day' : `${d} days`;
}

function tagLabel(t) {
  return { 'tag-pvp':'PvP', 'tag-world':'World', 'tag-optional':'Optional',
           'tag-delve':'Delve', 'tag-mythic':'Dungeon' }[t] || t;
}

function getMonthKey(ev) {
  const d = parseDate(ev.start);
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric', timeZone: 'UTC' });
}

/* ── STATE ── */
let activeFilter = 'all';
let isLightMode  = localStorage.getItem('wow_mn_theme') === 'light';
if (isLightMode) document.body.classList.add('light-mode');

function setEvFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.ev-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEvents();
}

function toggleTheme() {
  isLightMode = !isLightMode;
  document.body.classList.toggle('light-mode', isLightMode);
  localStorage.setItem('wow_mn_theme', isLightMode ? 'light' : 'dark');
  document.getElementById('btn-theme').textContent = isLightMode ? '🌙 Dark' : '☀️ Light';
}

/* ── NOW BANNER ── */
function renderNowBanner() {
  const active = EVENTS.filter(isActive);
  const banner = document.getElementById('now-banner');
  if (!active.length) {
    banner.innerHTML = `<span class="ev-now-label">Now</span><span class="ev-none-active">No events currently active.</span>`;
    return;
  }
  const items = active.map(ev =>
    `<div class="ev-now-item"><a href="${ev.url}" target="_blank">${ev.name}</a><span class="ev-now-dates">through ${new Date(parseDate(ev.end) - 86400000).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'})}</span></div>`
  ).join('');
  banner.innerHTML = `<span class="ev-now-label">Live Now</span><div class="ev-now-list">${items}</div>`;
}

/* ── MAIN RENDER ── */
function renderEvents() {
  const container = document.getElementById('events-container');
  const t = today();

  let filtered = EVENTS.filter(ev => {
    if (activeFilter === 'upcoming') return !isPast(ev);
    if (activeFilter.startsWith('tag-')) return ev.tags.includes(activeFilter) && !isPast(ev);
    return true; // 'all'
  });

  // Sort chronologically
  filtered.sort((a, b) => parseDate(a.start) - parseDate(b.start));

  if (!filtered.length) {
    container.innerHTML = `<p style="color:var(--text-muted);font-style:italic;text-align:center;padding:2rem;">No events match this filter.</p>`;
    return;
  }

  // Group by month
  const groups = {};
  const groupOrder = [];
  filtered.forEach(ev => {
    const key = getMonthKey(ev);
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(ev);
  });

  container.innerHTML = groupOrder.map(month => {
    const cards = groups[month].map(ev => {
      const active = isActive(ev), soon = isSoon(ev), past = isPast(ev);
      const cls = active ? ' ev-active' : soon ? ' ev-soon' : past ? ' ev-past' : '';
      const tagHtml = ev.tags.map(tg =>
        `<span class="ev-tag ev-tag-${tg.replace('tag-','')}">${tagLabel(tg)}</span>`
      ).join('');
      return `
        <div class="ev-card${cls}">
          <div class="ev-date-col">
            <div class="ev-date-range">${fmtDateRange(ev)}</div>
            <div class="ev-duration">${durationDays(ev)}</div>
          </div>
          <div class="ev-divider"></div>
          <div class="ev-content">
            <div class="ev-name"><a href="${ev.url}" target="_blank">${ev.name}</a></div>
            <div class="ev-desc">${ev.desc}</div>
            <div class="ev-tags">${tagHtml}</div>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="ev-month-group">
        <div class="ev-month-heading">${month}</div>
        ${cards}
      </div>`;
  }).join('');
}

/* ── INIT ── */
document.getElementById('btn-theme').textContent = isLightMode ? '🌙 Dark' : '☀️ Light';
renderNowBanner();
renderEvents();
</script>
